<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="ld-lantern" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#b45309" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="ld-glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- wood plank seams -->
  <g stroke="#92400e" stroke-opacity="0.12" stroke-width="2">
    <path d="M0 130 H1200"/><path d="M0 290 H1200"/><path d="M0 470 H1200"/><path d="M0 650 H1200"/>
  </g>
  <!-- hanging lantern -->
  <g transform="translate(600 0)">
    <line x1="0" y1="0" x2="0" y2="90" stroke="#78350f" stroke-opacity="0.4" stroke-width="3"/>
    <circle cx="0" cy="150" r="120" fill="url(#ld-glow2)"/>
    <rect x="-26" y="90" width="52" height="70" rx="8" fill="url(#ld-lantern)" stroke="#b45309" stroke-opacity="0.4" stroke-width="2"/>
  </g>
  <!-- faint large die, bottom right -->
  <g transform="translate(980 620) rotate(-12)" opacity="0.16">
    <rect x="-90" y="-90" width="180" height="180" rx="28" fill="none" stroke="#fbbf24" stroke-width="4"/>
    <g fill="#fbbf24">
      <circle cx="-40" cy="-40" r="14"/><circle cx="40" cy="-40" r="14"/>
      <circle cx="0" cy="0" r="14"/>
      <circle cx="-40" cy="40" r="14"/><circle cx="40" cy="40" r="14"/>
    </g>
  </g>
  <!-- coin stacks, bottom left -->
  <g transform="translate(170 700)" opacity="0.2" fill="none" stroke="#fbbf24" stroke-width="3">
    <ellipse cx="0" cy="40" rx="55" ry="16"/><ellipse cx="0" cy="22" rx="55" ry="16"/><ellipse cx="0" cy="4" rx="55" ry="16"/>
    <ellipse cx="120" cy="48" rx="42" ry="13"/><ellipse cx="120" cy="32" rx="42" ry="13"/>
  </g>
</svg>
