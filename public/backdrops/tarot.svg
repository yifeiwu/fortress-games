<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="tr-moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e9d5ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g fill="#f5d0fe">
    <circle cx="160" cy="120" r="1.6" opacity="0.8"/><circle cx="360" cy="200" r="1.2" opacity="0.5"/>
    <circle cx="540" cy="90" r="2" opacity="0.9"/><circle cx="820" cy="170" r="1.3" opacity="0.5"/>
    <circle cx="1040" cy="110" r="1.7" opacity="0.7"/><circle cx="240" cy="420" r="1.4" opacity="0.5"/>
    <circle cx="960" cy="470" r="1.6" opacity="0.6"/><circle cx="700" cy="560" r="1.2" opacity="0.5"/>
  </g>
  <!-- crescent moon -->
  <g transform="translate(1000 160)">
    <circle cx="0" cy="0" r="130" fill="url(#tr-moon)"/>
    <path d="M30 -70 A70 70 0 1 0 30 70 A55 55 0 1 1 30 -70 Z" fill="#e9d5ff" opacity="0.4"/>
  </g>
  <!-- radiant sun sigil, faint -->
  <g transform="translate(200 620)" opacity="0.18" stroke="#c084fc" stroke-width="3" fill="none">
    <circle cx="0" cy="0" r="44"/>
    <g>
      <line x1="0" y1="-70" x2="0" y2="-56"/><line x1="0" y1="56" x2="0" y2="70"/>
      <line x1="-70" y1="0" x2="-56" y2="0"/><line x1="56" y1="0" x2="70" y2="0"/>
      <line x1="-50" y1="-50" x2="-40" y2="-40"/><line x1="40" y1="40" x2="50" y2="50"/>
      <line x1="-50" y1="50" x2="-40" y2="40"/><line x1="40" y1="-40" x2="50" y2="-50"/>
    </g>
  </g>
  <!-- six-point star -->
  <g transform="translate(600 400)" opacity="0.1" stroke="#a855f7" stroke-width="2" fill="none">
    <path d="M0 -300 L0 300 M-260 -150 L260 150 M-260 150 L260 -150"/>
  </g>
</svg>
