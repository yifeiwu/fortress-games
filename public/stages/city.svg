<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="citySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="50%" stop-color="#3a2050"/>
      <stop offset="100%" stop-color="#7a3a5a"/>
    </linearGradient>
    <linearGradient id="cityGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2438"/>
      <stop offset="100%" stop-color="#161220"/>
    </linearGradient>
    <radialGradient id="citySun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
    </radialGradient>
    <style>
      .twinkle { animation: cTwinkle 3.8s ease-in-out infinite; }
      .twinkle:nth-of-type(2n) { animation-duration: 5s; animation-delay: -1.6s; }
      .twinkle:nth-of-type(3n) { animation-duration: 6s; animation-delay: -3s; }
      .sunGlow { animation: cSun 8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .win { animation: cBlink 5s steps(1) infinite; }
      .win:nth-of-type(3n) { animation-duration: 7s; animation-delay: -2s; }
      .win:nth-of-type(4n) { animation-duration: 9s; animation-delay: -4s; }
      .win:nth-of-type(5n) { animation-duration: 6.2s; animation-delay: -1s; }
      .beacon { animation: cBeacon 2.4s ease-in-out infinite; }
      .plane { animation: cPlane 16s linear infinite; }
      .carR { animation: cTurnL 11s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .carR2 { animation-duration: 14s; animation-delay: -6s; }
      .carL { animation: cTurnR 12s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .carL2 { animation-duration: 15.5s; animation-delay: -7.5s; }
      @keyframes cTwinkle { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
      @keyframes cSun { 0%,100% { opacity: .5; transform: scale(1); } 50% { opacity: .72; transform: scale(1.05); } }
      @keyframes cBlink { 0%,46% { opacity: .9; } 50%,96% { opacity: .25; } 100% { opacity: .9; } }
      @keyframes cBeacon { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
      @keyframes cPlane { 0% { transform: translateX(-60px); opacity: 0; } 8% { opacity: 1; } 92% { opacity: 1; } 100% { transform: translateX(880px); opacity: 0; } }
      /* Beasts block the road mid-stage, so cars drive in, brake, U-turn (the
         scaleX flip), and head back out the way they came. */
      @keyframes cTurnL {
        0%   { transform: translateX(-170px) scaleX(1); }
        36%  { transform: translateX(120px) scaleX(1); }
        44%  { transform: translateX(120px) scaleX(1); }
        49%  { transform: translateX(120px) scaleX(-1); }
        85%  { transform: translateX(-170px) scaleX(-1); }
        100% { transform: translateX(-170px) scaleX(-1); }
      }
      @keyframes cTurnR {
        0%   { transform: translateX(820px) scaleX(1); }
        36%  { transform: translateX(650px) scaleX(1); }
        44%  { transform: translateX(650px) scaleX(1); }
        49%  { transform: translateX(650px) scaleX(-1); }
        85%  { transform: translateX(820px) scaleX(-1); }
        100% { transform: translateX(820px) scaleX(-1); }
      }
    </style>
  </defs>

  <!-- sky -->
  <rect width="800" height="400" fill="url(#citySky)"/>

  <!-- dusk sun glow -->
  <circle class="sunGlow" cx="400" cy="250" r="160" fill="url(#citySun)"/>
  <circle cx="400" cy="250" r="50" fill="#ffcaa0" opacity="0.7"/>

  <!-- stars -->
  <g fill="#e9e0ff">
    <circle class="twinkle" cx="90" cy="50" r="1.4"/><circle class="twinkle" cx="210" cy="80" r="1.1"/>
    <circle class="twinkle" cx="650" cy="60" r="1.4"/><circle class="twinkle" cx="730" cy="110" r="1.2"/>
    <circle class="twinkle" cx="540" cy="40" r="1.2"/>
  </g>

  <!-- blinking aircraft crossing the skyline -->
  <circle class="plane" cx="0" cy="70" r="2" fill="#ff5a5a"/>

  <!-- far skyline -->
  <g fill="#241a3a" opacity="0.85">
    <rect x="0" y="200" width="60" height="100"/>
    <rect x="70" y="170" width="50" height="130"/>
    <rect x="130" y="210" width="44" height="90"/>
    <rect x="180" y="222" width="46" height="78"/>
    <rect x="232" y="196" width="40" height="104"/>
    <rect x="350" y="214" width="44" height="86"/>
    <rect x="402" y="188" width="38" height="112"/>
    <rect x="500" y="206" width="44" height="94"/>
    <rect x="552" y="226" width="40" height="74"/>
    <rect x="600" y="180" width="48" height="120"/>
    <rect x="656" y="210" width="40" height="90"/>
    <rect x="704" y="160" width="56" height="140"/>
    <rect x="766" y="200" width="40" height="100"/>
  </g>

  <!-- near skyline (darker, taller, framing) -->
  <g fill="#181226">
    <rect x="20" y="130" width="80" height="170"/>
    <rect x="108" y="90" width="64" height="210"/>
    <rect x="186" y="156" width="56" height="144"/>
    <rect x="556" y="168" width="58" height="132"/>
    <rect x="630" y="100" width="72" height="200"/>
    <rect x="708" y="140" width="74" height="160"/>
    <!-- antenna -->
    <rect x="138" y="60" width="6" height="32"/>
    <rect x="662" y="72" width="6" height="30"/>
  </g>
  <!-- antenna beacons -->
  <circle class="beacon" cx="141" cy="58" r="3" fill="#ff5a5a"/>
  <circle class="beacon" cx="665" cy="70" r="3" fill="#ff5a5a" style="animation-delay:-1.1s"/>

  <!-- ruined building: blown-out top, crack, and a rubble pile at its base -->
  <g>
    <path fill="#1d1630" d="M250 300 L250 196 L264 196 L264 174 L278 174 L278 200 L292 178 L304 192 L304 158 L316 170 L322 152 L330 184 L342 300 Z"/>
    <!-- jagged hole punched through the facade -->
    <path fill="#0e0a18" d="M286 236 L300 224 L308 244 L298 258 L284 252 Z"/>
    <!-- crack running down the wall -->
    <path stroke="#0e0a18" stroke-width="2" fill="none" d="M270 200 l6 22 l-5 16 l7 20 l-4 18"/>
    <!-- a few surviving lit windows + dark broken ones -->
    <g fill="#ffd36b"><rect class="win" x="258" y="210" width="9" height="12"/><rect class="win" x="322" y="214" width="9" height="12"/><rect class="win" x="258" y="262" width="9" height="12"/></g>
    <g fill="#0e0a18"><rect x="272" y="240" width="9" height="12"/><rect x="320" y="244" width="9" height="12"/><rect x="272" y="272" width="9" height="12"/><rect x="306" y="276" width="9" height="12"/></g>
    <!-- rubble spilling onto the street -->
    <g fill="#13101e">
      <path d="M236 300 L246 286 L262 296 L276 284 L290 300 Z"/>
      <path d="M330 300 L344 290 L358 300 Z"/>
      <rect x="252" y="294" width="10" height="7"/>
      <rect x="300" y="296" width="8" height="5"/>
      <rect x="318" y="293" width="11" height="8" transform="rotate(-12 323 297)"/>
    </g>
  </g>

  <!-- lit windows -->
  <g fill="#ffd36b">
    <rect class="win" x="36" y="150" width="10" height="14"/><rect class="win" x="56" y="150" width="10" height="14"/>
    <rect class="win" x="36" y="180" width="10" height="14"/><rect class="win" x="76" y="180" width="10" height="14"/>
    <rect class="win" x="36" y="210" width="10" height="14"/><rect class="win" x="56" y="210" width="10" height="14"/>
    <rect class="win" x="122" y="112" width="10" height="14"/><rect class="win" x="146" y="112" width="10" height="14"/>
    <rect class="win" x="122" y="146" width="10" height="14"/><rect class="win" x="146" y="180" width="10" height="14"/>
    <rect class="win" x="646" y="124" width="10" height="14"/><rect class="win" x="672" y="124" width="10" height="14"/>
    <rect class="win" x="646" y="158" width="10" height="14"/><rect class="win" x="672" y="192" width="10" height="14"/>
    <rect class="win" x="724" y="160" width="10" height="14"/><rect class="win" x="750" y="160" width="10" height="14"/>
    <rect class="win" x="724" y="196" width="10" height="14"/><rect class="win" x="750" y="230" width="10" height="14"/>
    <rect class="win" x="198" y="176" width="9" height="12"/><rect class="win" x="220" y="176" width="9" height="12"/>
    <rect class="win" x="198" y="206" width="9" height="12"/><rect class="win" x="220" y="236" width="9" height="12"/>
    <rect class="win" x="198" y="266" width="9" height="12"/>
    <rect class="win" x="568" y="186" width="9" height="12"/><rect class="win" x="592" y="186" width="9" height="12"/>
    <rect class="win" x="568" y="216" width="9" height="12"/><rect class="win" x="592" y="248" width="9" height="12"/>
    <rect class="win" x="568" y="278" width="9" height="12"/>
  </g>

  <!-- ground (street) -->
  <rect y="300" width="800" height="100" fill="url(#cityGround)"/>
  <rect y="300" width="800" height="6" fill="#3a3050" opacity="0.8"/>
  <!-- lane markings -->
  <g fill="#c9b86a" opacity="0.55">
    <rect x="120" y="352" width="48" height="8"/>
    <rect x="260" y="352" width="48" height="8"/>
    <rect x="400" y="352" width="48" height="8"/>
    <rect x="540" y="352" width="48" height="8"/>
    <rect x="680" y="352" width="48" height="8"/>
  </g>
  <!-- manhole / debris -->
  <ellipse cx="600" cy="386" rx="30" ry="9" fill="#241d32"/>

  <!-- blast craters & cracked asphalt -->
  <g>
    <g transform="translate(150 330)">
      <ellipse cx="0" cy="1" rx="26" ry="9" fill="#3a3050" opacity="0.7"/>
      <ellipse cx="0" cy="0" rx="20" ry="7" fill="#0e0a18"/>
      <ellipse cx="2" cy="0" rx="11" ry="3.5" fill="#070510"/>
      <path stroke="#0e0a18" stroke-width="1.5" fill="none" d="M-20 -1 l-12 -5 M19 1 l13 -2 M-5 -7 l-3 -9 M8 7 l4 8"/>
      <rect x="-26" y="-1" width="7" height="5" fill="#2a2240" transform="rotate(-14 -22 1)"/>
      <rect x="20" y="-4" width="6" height="4" fill="#2a2240"/>
    </g>
    <g transform="translate(370 392)">
      <ellipse cx="0" cy="1" rx="22" ry="7" fill="#3a3050" opacity="0.65"/>
      <ellipse cx="0" cy="0" rx="16" ry="5" fill="#0e0a18"/>
      <ellipse cx="1" cy="0" rx="8" ry="2.6" fill="#070510"/>
      <path stroke="#0e0a18" stroke-width="1.4" fill="none" d="M-16 0 l-10 -3 M15 1 l9 4"/>
    </g>
    <g transform="translate(720 340)">
      <ellipse cx="0" cy="0" rx="15" ry="5" fill="#0e0a18"/>
      <ellipse cx="0" cy="0" rx="8" ry="2.6" fill="#070510"/>
      <path stroke="#0e0a18" stroke-width="1.3" fill="none" d="M-15 0 l-8 -4 M14 0 l8 3"/>
    </g>
  </g>

  <!-- traffic: far lane heads left, near lane heads right -->
  <!-- left-bound (background, smaller) -->
  <g class="carL">
    <circle cx="1" cy="337" r="6" fill="#fff6c8" opacity="0.18"/>
    <rect x="0" y="332" width="38" height="11" rx="3" fill="#3b6fd0"/>
    <rect x="8" y="326" width="20" height="8" rx="2" fill="#27508f"/>
    <rect x="10" y="328" width="15" height="5" fill="#bfeaff" opacity="0.5"/>
    <circle cx="10" cy="344" r="3.2" fill="#0c0a14"/><circle cx="30" cy="344" r="3.2" fill="#0c0a14"/>
    <rect x="-1" y="335" width="3" height="4" fill="#fff6c8"/>
    <rect x="36" y="335" width="3" height="4" fill="#ff5a5a"/>
  </g>
  <g class="carL carL2">
    <circle cx="1" cy="339" r="6" fill="#fff6c8" opacity="0.18"/>
    <rect x="0" y="334" width="34" height="10" rx="3" fill="#caa24a"/>
    <rect x="7" y="329" width="18" height="7" rx="2" fill="#9c7a32"/>
    <rect x="9" y="331" width="13" height="4" fill="#fff0c0" opacity="0.5"/>
    <circle cx="9" cy="345" r="3" fill="#0c0a14"/><circle cx="27" cy="345" r="3" fill="#0c0a14"/>
    <rect x="-1" y="337" width="3" height="4" fill="#fff6c8"/>
    <rect x="32" y="337" width="3" height="4" fill="#ff5a5a"/>
  </g>

  <!-- right-bound (foreground, larger) -->
  <g class="carR">
    <circle cx="48" cy="377" r="7" fill="#fff6c8" opacity="0.22"/>
    <rect x="0" y="370" width="46" height="14" rx="4" fill="#cc3a3a"/>
    <rect x="10" y="362" width="24" height="10" rx="3" fill="#a32a2a"/>
    <rect x="13" y="364" width="18" height="6" fill="#ffe9a8" opacity="0.55"/>
    <circle cx="12" cy="386" r="4" fill="#0c0a14"/><circle cx="36" cy="386" r="4" fill="#0c0a14"/>
    <rect x="44" y="374" width="4" height="5" fill="#fff6c8"/>
    <rect x="-1" y="374" width="3" height="5" fill="#ff5a5a"/>
  </g>
  <g class="carR carR2">
    <circle cx="44" cy="379" r="7" fill="#fff6c8" opacity="0.22"/>
    <rect x="0" y="373" width="42" height="13" rx="4" fill="#2f9e6e"/>
    <rect x="9" y="366" width="22" height="9" rx="3" fill="#227a54"/>
    <rect x="12" y="368" width="16" height="5" fill="#d8fff0" opacity="0.5"/>
    <circle cx="11" cy="387" r="3.6" fill="#0c0a14"/><circle cx="33" cy="387" r="3.6" fill="#0c0a14"/>
    <rect x="40" y="377" width="4" height="5" fill="#fff6c8"/>
    <rect x="-1" y="377" width="3" height="5" fill="#ff5a5a"/>
  </g>
</svg>
