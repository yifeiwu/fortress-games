<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" role="img" aria-label="Fortune's Veil artwork">
  <defs>
    <linearGradient id="tr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#170a1f"/>
      <stop offset="1" stop-color="#030014"/>
    </linearGradient>
    <radialGradient id="tr-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tr-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1240"/>
      <stop offset="1" stop-color="#1a0a2e"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" fill="url(#tr-bg)"/>
  <rect width="400" height="200" fill="url(#tr-glow)"/>

  <!-- stars -->
  <g fill="#f5d0fe">
    <circle cx="60" cy="30" r="1.6"/>
    <circle cx="340" cy="40" r="1.8"/>
    <circle cx="300" cy="20" r="1.1"/>
    <circle cx="110" cy="170" r="1.4"/>
    <circle cx="290" cy="176" r="1.2"/>
    <circle cx="36" cy="120" r="1.2"/>
  </g>
  <!-- four-point sparkles -->
  <g fill="#f0abfc">
    <path d="M70 70 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" opacity="0.8"/>
    <path d="M330 130 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" opacity="0.7"/>
  </g>

  <!-- fanned tarot cards -->
  <g stroke="#c084fc" stroke-width="2">
    <g transform="translate(132 110) rotate(-16)">
      <rect x="-34" y="-52" width="68" height="104" rx="8" fill="url(#tr-card)"/>
      <rect x="-26" y="-44" width="52" height="88" rx="4" fill="none" stroke="#a855f7" stroke-opacity="0.6"/>
    </g>
    <g transform="translate(268 110) rotate(16)">
      <rect x="-34" y="-52" width="68" height="104" rx="8" fill="url(#tr-card)"/>
      <rect x="-26" y="-44" width="52" height="88" rx="4" fill="none" stroke="#a855f7" stroke-opacity="0.6"/>
    </g>
    <!-- center card (raised) -->
    <g transform="translate(200 96)">
      <rect x="-38" y="-60" width="76" height="120" rx="9" fill="url(#tr-card)" stroke="#e879f9"/>
      <rect x="-30" y="-52" width="60" height="104" rx="5" fill="none" stroke="#f0abfc" stroke-opacity="0.7" stroke-width="1.5"/>
      <!-- moon -->
      <path d="M6 -14 a22 22 0 1 0 0 28 a17 17 0 0 1 0 -28 z" fill="#fbbf24"/>
      <!-- little stars on card -->
      <g fill="#f0abfc">
        <path d="M-14 -30 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 z"/>
        <path d="M16 30 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 z"/>
      </g>
    </g>
  </g>
</svg>
