<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" role="img" aria-label="FrankenBeasts wolf, snake body, and goat horns artwork">
  <defs>
    <linearGradient id="fb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08160f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="fb-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fb-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d1d5db"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="fb-horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f4"/>
      <stop offset="1" stop-color="#a8a29e"/>
    </linearGradient>
    <linearGradient id="fb-snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" fill="url(#fb-bg)"/>
  <rect width="400" height="200" fill="url(#fb-glow)"/>

  <!-- electric arcs -->
  <g stroke="#a7f3d0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <path d="M60 50 l14 12 -10 10 16 14"/>
    <path d="M340 46 l-14 12 10 10 -16 14"/>
  </g>

  <!-- snake body -->
  <g transform="translate(200 118)">
    <path
      d="M-140 36
         C-110 14,-76 18,-46 34
         C-20 48,6 44,28 30
         C60 10,100 14,130 34
         C146 44,146 64,130 74
         C104 90,72 90,40 78
         C10 66,-16 68,-48 84
         C-82 100,-118 94,-140 76
         C-156 64,-156 46,-140 36 Z"
      fill="url(#fb-snake)"
      stroke="#14532d"
      stroke-width="3"
    />
    <path d="M-126 60 C-84 40,-28 44,20 60 C70 78,112 74,132 58" fill="none" stroke="#86efac" stroke-opacity="0.45" stroke-width="3"/>
    <g fill="#14532d" opacity="0.5">
      <circle cx="-88" cy="62" r="4"/>
      <circle cx="-52" cy="58" r="4"/>
      <circle cx="-14" cy="62" r="4"/>
      <circle cx="24" cy="66" r="4"/>
      <circle cx="62" cy="62" r="4"/>
      <circle cx="98" cy="58" r="4"/>
    </g>
  </g>

  <!-- wolf head + goat horns -->
  <g transform="translate(200 88)">
    <!-- left horn -->
    <path d="M-70 -22 C-112 -54,-104 -92,-66 -104 C-86 -78,-84 -54,-56 -34" fill="none" stroke="url(#fb-horn)" stroke-width="10" stroke-linecap="round"/>
    <path d="M-94 -74 C-82 -72,-72 -66,-64 -56" fill="none" stroke="#78716c" stroke-width="2" stroke-linecap="round"/>
    <path d="M-100 -88 C-88 -86,-78 -80,-70 -70" fill="none" stroke="#78716c" stroke-width="2" stroke-linecap="round"/>
    <!-- right horn -->
    <path d="M70 -22 C112 -54,104 -92,66 -104 C86 -78,84 -54,56 -34" fill="none" stroke="url(#fb-horn)" stroke-width="10" stroke-linecap="round"/>
    <path d="M94 -74 C82 -72,72 -66,64 -56" fill="none" stroke="#78716c" stroke-width="2" stroke-linecap="round"/>
    <path d="M100 -88 C88 -86,78 -80,70 -70" fill="none" stroke="#78716c" stroke-width="2" stroke-linecap="round"/>

    <!-- ears -->
    <path d="M-58 -44 L-40 -76 L-20 -40 Z" fill="#6b7280" stroke="#1f2937" stroke-width="3"/>
    <path d="M58 -44 L40 -76 L20 -40 Z" fill="#6b7280" stroke="#1f2937" stroke-width="3"/>
    <path d="M-44 -46 L-38 -60 L-30 -44 Z" fill="#fca5a5" opacity="0.6"/>
    <path d="M44 -46 L38 -60 L30 -44 Z" fill="#fca5a5" opacity="0.6"/>

    <!-- head -->
    <ellipse cx="0" cy="-6" rx="52" ry="44" fill="url(#fb-fur)" stroke="#1f2937" stroke-width="3"/>
    <!-- muzzle -->
    <ellipse cx="0" cy="16" rx="30" ry="20" fill="#d1d5db" stroke="#4b5563" stroke-width="2"/>
    <polygon points="0,8 -8,16 8,16" fill="#111827"/>

    <!-- eyes -->
    <ellipse cx="-18" cy="-10" rx="8" ry="9" fill="#111827"/>
    <ellipse cx="18" cy="-10" rx="8" ry="9" fill="#111827"/>
    <circle cx="-18" cy="-12" r="3" fill="#34d399"/>
    <circle cx="18" cy="-12" r="3" fill="#34d399"/>

    <!-- stitches -->
    <g stroke="#14532d" stroke-width="3" stroke-linecap="round">
      <path d="M-8 -26 L16 -34"/>
      <path d="M-30 10 L-8 18"/>
      <path d="M8 26 L30 18"/>
    </g>
    <g stroke="#14532d" stroke-width="2" stroke-linecap="round">
      <path d="M-4 -28 L-2 -22"/>
      <path d="M4 -30 L6 -24"/>
      <path d="M12 -32 L14 -26"/>
      <path d="M-24 12 L-20 8"/>
      <path d="M-16 16 L-12 12"/>
      <path d="M16 24 L20 20"/>
      <path d="M24 20 L28 16"/>
    </g>

    <!-- fangs -->
    <g fill="#ecfdf5">
      <path d="M-14 26 l6 10 6 -10 z"/>
      <path d="M2 26 l6 10 6 -10 z"/>
    </g>
  </g>
</svg>
