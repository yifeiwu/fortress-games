<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" role="img" aria-label="Bluffer's Hoard artwork">
  <defs>
    <linearGradient id="ld-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1405"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="ld-glow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ld-cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="ld-coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" fill="url(#ld-bg)"/>
  <rect width="400" height="200" fill="url(#ld-glow)"/>

  <!-- coin hoard -->
  <g stroke="#b45309" stroke-width="1.5">
    <ellipse cx="120" cy="172" rx="26" ry="9" fill="url(#ld-coin)"/>
    <ellipse cx="120" cy="166" rx="26" ry="9" fill="url(#ld-coin)"/>
    <ellipse cx="120" cy="160" rx="26" ry="9" fill="url(#ld-coin)"/>
    <ellipse cx="300" cy="176" rx="22" ry="8" fill="url(#ld-coin)"/>
    <ellipse cx="300" cy="170" rx="22" ry="8" fill="url(#ld-coin)"/>
    <circle cx="160" cy="178" r="10" fill="url(#ld-coin)"/>
    <circle cx="250" cy="180" r="9" fill="url(#ld-coin)"/>
  </g>

  <!-- tipped dice cup -->
  <g transform="translate(95 96) rotate(-24)">
    <path d="M-34 -52 L34 -52 L24 40 L-24 40 Z" fill="url(#ld-cup)" stroke="#7c2d12" stroke-width="2"/>
    <ellipse cx="0" cy="-52" rx="34" ry="11" fill="#7c2d12"/>
    <ellipse cx="0" cy="-52" rx="27" ry="8" fill="#451a03"/>
    <ellipse cx="0" cy="40" rx="24" ry="8" fill="#92400e"/>
  </g>

  <!-- spilled dice -->
  <g stroke="#92400e" stroke-width="1.5">
    <!-- die 1 -->
    <g transform="translate(196 118) rotate(-12)">
      <rect x="-26" y="-26" width="52" height="52" rx="10" fill="#fef3c7"/>
      <g fill="#7c2d12">
        <circle cx="-12" cy="-12" r="4.5"/><circle cx="12" cy="-12" r="4.5"/>
        <circle cx="0" cy="0" r="4.5"/>
        <circle cx="-12" cy="12" r="4.5"/><circle cx="12" cy="12" r="4.5"/>
      </g>
    </g>
    <!-- die 2 -->
    <g transform="translate(258 142) rotate(10)">
      <rect x="-22" y="-22" width="44" height="44" rx="9" fill="#fef3c7"/>
      <g fill="#7c2d12">
        <circle cx="-10" cy="-10" r="4"/><circle cx="10" cy="-10" r="4"/>
        <circle cx="-10" cy="10" r="4"/><circle cx="10" cy="10" r="4"/>
      </g>
    </g>
    <!-- die 3 -->
    <g transform="translate(312 120) rotate(-18)">
      <rect x="-20" y="-20" width="40" height="40" rx="8" fill="#fef3c7"/>
      <circle cx="0" cy="0" r="4.5" fill="#7c2d12"/>
    </g>
  </g>
</svg>
