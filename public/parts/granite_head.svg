<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#2b2b2b" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round">
    <!-- neck seam column (right edge reaches x=100 across y=34..66) -->
    <path d="M72 30 H100 V70 H72 Z" fill="#7d8388" stroke="none"/>
    <path d="M72 30 H100 M72 70 H100" fill="none"/>
    <!-- main carved granite head silhouette -->
    <path d="M8 47 L16 33 L34 25 L52 26 L74 33 L86 40 L86 60 L74 67 L60 64 L34 65 L14 60 L7 53 Z" fill="#888e93"/>
    <!-- lower jaw block -->
    <path d="M12 60 L58 60 L72 64 L70 76 L20 76 L12 70 Z" fill="#797f84"/>
    <!-- stone block fractures (lighter highlights) -->
    <g stroke="#b6bbbe" stroke-width="1.2" fill="none" opacity="0.85">
      <path d="M16 34 L33 30 L52 30 M34 26 L37 50 M52 27 L55 52 M74 34 L70 60 M16 50 L74 50"/>
    </g>
    <!-- shading blocks -->
    <path d="M74 33 L86 40 L86 60 L74 64 Z" fill="#6f757a" stroke="#2b2b2b" stroke-width="1.4"/>
    <path d="M8 47 L16 33 L19 49 L11 54 Z" fill="#9aa0a4" stroke="#2b2b2b" stroke-width="1.4"/>
    <!-- carved square eye -->
    <rect x="40" y="38" width="12" height="9" rx="1.5" fill="#5d6368"/>
    <rect x="43" y="40" width="6" height="5" fill="#3f4448" stroke="#2b2b2b" stroke-width="1.2"/>
    <!-- blocky teeth gap -->
    <g fill="#9aa0a4" stroke="#2b2b2b" stroke-width="1.2">
      <rect x="22" y="58" width="8" height="6" rx="1"/>
      <rect x="36" y="58" width="8" height="6" rx="1"/>
      <rect x="50" y="58" width="8" height="6" rx="1"/>
    </g>
    <!-- speckle pits -->
    <g fill="#6f757a" stroke="none">
      <circle cx="30" cy="42" r="1"/>
      <circle cx="62" cy="38" r="1"/>
      <circle cx="58" cy="48" r="1"/>
      <circle cx="26" cy="68" r="1"/>
    </g>
  </g>
</svg>
