<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#2b1208" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- neck seam column -->
    <path d="M74 30 H100 V70 H74 Z" fill="#d6322a" stroke="none"/>
    <path d="M74 30 H100 M74 70 H100" fill="none"/>
    <!-- swept-back horns -->
    <path d="M66 26 C76 14 90 12 96 16 C88 18 80 24 74 34 Z" fill="#c79a5a"/>
    <path d="M62 30 C72 20 84 20 92 24 C84 24 76 30 70 38 Z" fill="#b8884a"/>
    <!-- upper head / skull -->
    <path d="M30 40 L40 30 L52 24 L66 26 L78 34 L84 46 L82 58 L70 56 L56 54 L42 50 L32 46 Z" fill="#d6322a"/>
    <!-- snout extends left -->
    <path d="M30 40 L18 40 L14 46 L20 50 L34 48 Z" fill="#d6322a"/>
    <!-- lower jaw -->
    <path d="M34 50 L56 54 L72 58 L70 70 L52 72 L40 64 Z" fill="#c2271f"/>
    <!-- open maw interior -->
    <path d="M30 46 L60 52 L58 62 L40 62 L30 54 Z" fill="#3a0f08" stroke="#2b1208" stroke-width="1.4"/>
    <!-- teeth -->
    <g fill="#ecdcb8" stroke="#2b1208" stroke-width="1">
      <path d="M22 46 L20 56 L26 47 Z"/>
      <path d="M30 47 L29 55 L34 48 Z"/>
      <path d="M40 49 L39 56 L44 50 Z"/>
      <path d="M38 62 L39 55 L43 62 Z"/>
      <path d="M48 63 L49 56 L53 63 Z"/>
    </g>
    <!-- scale / orange jaw shading -->
    <path d="M70 56 L82 58 L80 70 L70 70 Z" fill="#e8742a" stroke="#2b1208" stroke-width="1.3"/>
    <!-- nostril snarl -->
    <path d="M22 42 L18 38 L14 42 L18 46 Z" fill="#a31f1a" stroke="#2b1208" stroke-width="1.2"/>
    <ellipse cx="19" cy="42" rx="1.4" ry="2" fill="#2b1208" stroke="none"/>
    <!-- brow + yellow eye -->
    <path d="M50 30 L66 30 L64 38 L52 38 Z" fill="#a31f1a" stroke="#2b1208" stroke-width="1.3"/>
    <ellipse cx="58" cy="36" rx="6" ry="4.5" fill="#f2cf2e" stroke="#2b1208" stroke-width="1.5"/>
    <path d="M58 31.5 C61 35 61 37 58 40.5 C55 37 55 35 58 31.5 Z" fill="#2b1208" stroke="none"/>
    <!-- scale texture -->
    <g fill="none" stroke="#a31f1a" stroke-width="1" opacity="0.85">
      <path d="M50 42 q4 3 0 6 M58 44 q4 3 0 6 M66 42 q4 3 0 6 M72 38 q4 3 0 6 M54 50 q4 3 0 6"/>
    </g>
    <!-- ====== FIRE BREATH (to the left) ====== -->
    <!-- smoke -->
    <g stroke="#4a4a4a" stroke-width="1.4">
      <circle cx="10" cy="40" r="7" fill="#6f6f6f"/>
      <circle cx="8" cy="58" r="6" fill="#7c7c7c"/>
      <circle cx="18" cy="34" r="5" fill="#878787"/>
    </g>
    <!-- flame body -->
    <path d="M30 50 C22 46 14 48 6 44 C12 50 8 52 14 54 C8 56 12 60 18 58 C14 62 20 64 26 60 C24 64 30 64 32 58 Z" fill="#e8742a" stroke="#2b1208" stroke-width="1.6"/>
    <path d="M28 52 C20 50 14 52 9 50 C14 54 11 55 15 56 C11 58 15 60 19 58 C16 61 22 60 26 56 Z" fill="#f4a72a" stroke="none"/>
    <path d="M27 53 C20 52 16 54 12 53 C16 56 13 57 17 57 C14 59 19 58 24 55 Z" fill="#f6e02a" stroke="none"/>
  </g>
</svg>
