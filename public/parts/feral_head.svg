<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#1a120c" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round">
    <!-- neck seam column -->
    <path d="M74 30 H100 V70 H74 Z" fill="#3a2a1f" stroke="none"/>
    <path d="M74 30 H100 M74 70 H100" fill="none"/>
    <!-- spiky furred head silhouette -->
    <path d="M14 40 L24 32 L30 22 L38 28 L46 18 L54 26 L64 20 L72 28 L82 26 L86 38 L84 54 L80 64 L72 62 L66 70 L56 66 L46 64 L34 56 Z" fill="#3e2e22"/>
    <!-- darker fur back -->
    <path d="M54 26 L64 20 L72 28 L82 26 L86 38 L78 44 L66 36 L58 34 Z" fill="#2a1e16" stroke="#1a120c" stroke-width="1.3"/>
    <!-- snout (lower) -->
    <path d="M14 40 L30 42 L42 48 L40 56 L24 56 L14 48 Z" fill="#4a3527"/>
    <!-- lower jaw dropped, open maw -->
    <path d="M28 54 L48 56 L56 60 L52 74 L38 78 L30 70 Z" fill="#3e2e22"/>
    <!-- mouth interior / gums -->
    <path d="M22 50 L50 56 L52 64 L40 70 L26 64 Z" fill="#5a2630" stroke="#1a120c" stroke-width="1.4"/>
    <path d="M30 58 L46 60 L44 66 L34 65 Z" fill="#7a3540" stroke="none"/>
    <!-- big upper fangs with drool -->
    <g fill="#e9dcc2" stroke="#1a120c" stroke-width="1">
      <path d="M16 48 L14 66 L22 50 Z"/>
      <path d="M26 50 L25 62 L31 51 Z"/>
      <path d="M36 52 L35 61 L41 53 Z"/>
    </g>
    <!-- lower fangs -->
    <g fill="#e9dcc2" stroke="#1a120c" stroke-width="1">
      <path d="M30 64 L31 56 L35 64 Z"/>
      <path d="M40 66 L41 58 L45 66 Z"/>
    </g>
    <!-- drool drips -->
    <g fill="#e8e2cf" stroke="#1a120c" stroke-width="0.7">
      <path d="M14 66 q-1 5 0 8" fill="none" stroke-width="1.8"/>
      <circle cx="14" cy="76" r="1.4"/>
      <path d="M35 64 q0 5 0 7" fill="none" stroke-width="1.5"/>
      <circle cx="35" cy="73" r="1.2"/>
    </g>
    <!-- nose -->
    <path d="M12 38 Q9 43 15 45 Q22 46 20 39 Q18 35 13 36 Z" fill="#1f160f"/>
    <!-- bloodshot bulging eye -->
    <circle cx="40" cy="34" r="7" fill="#e8dcd0" stroke="#1a120c" stroke-width="1.6"/>
    <g stroke="#b03028" stroke-width="0.7" fill="none" opacity="0.8">
      <path d="M40 34 L34 31 M40 34 L46 32 M40 34 L36 40 M40 34 L45 38"/>
    </g>
    <circle cx="40" cy="34" r="2.4" fill="#1a120c" stroke="none"/>
    <!-- squinted far eye -->
    <path d="M58 36 q6 -3 11 1 q-5 4 -11 -1 Z" fill="#1f160f" stroke="#1a120c" stroke-width="1.2"/>
    <!-- fur texture -->
    <g fill="none" stroke="#2a1e16" stroke-width="1" opacity="0.8">
      <path d="M60 44 L72 50 M62 54 L74 58 M56 60 L66 64"/>
    </g>
  </g>
</svg>
