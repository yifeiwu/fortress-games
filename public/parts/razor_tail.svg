<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- thin segmented tail ending in a silver razor sickle blade; base seam left x=0, y34..66 -->
  <!-- solid base cuff spanning the seam band -->
  <path d="M0 34 L12 37 L13 63 L0 66 Z" fill="#454b53" stroke="#241a14" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="4" cy="50" rx="3" ry="13" fill="#2a2e33" stroke="#241a14" stroke-width="1.6"/>
  <ellipse cx="4" cy="50" rx="1.6" ry="9" fill="#3f444b" stroke="none"/>
  <!-- thin curving shaft (dark outline under, steel over) -->
  <path d="M12 50 C24 59 36 59 46 51 C53 45 58 42 63 39"
        fill="none" stroke="#241a14" stroke-width="11" stroke-linecap="round"/>
  <path d="M12 50 C24 59 36 59 46 51 C53 45 58 42 63 39"
        fill="none" stroke="#4a4f57" stroke-width="8" stroke-linecap="round"/>
  <path d="M14 48 C24 56 35 56 45 49 C52 44 57 41 62 38"
        fill="none" stroke="#62686f" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- shaft segment lines -->
  <g stroke="#241a14" stroke-width="1.6" stroke-linecap="round" opacity="0.85">
    <line x1="20" y1="50" x2="22" y2="58"/>
    <line x1="28" y1="52" x2="29" y2="61"/>
    <line x1="36" y1="52" x2="36" y2="61"/>
    <line x1="44" y1="49" x2="42" y2="57"/>
    <line x1="51" y1="44" x2="48" y2="52"/>
    <line x1="57" y1="41" x2="54" y2="48"/>
  </g>
  <!-- blade guard with two spikes -->
  <g fill="#5a6068" stroke="#241a14" stroke-width="1.8" stroke-linejoin="round">
    <polygon points="62,42 70,40 64,30 60,38"/>
    <polygon points="62,42 72,46 66,54 58,46"/>
  </g>
  <!-- silver sickle blade -->
  <path d="M64 34 C80 28 93 38 95 56 C90 44 79 41 70 46 C67 42 64 38 64 34 Z"
        fill="#c9ced6" stroke="#241a14" stroke-width="2" stroke-linejoin="round"/>
  <!-- blade highlight -->
  <path d="M67 35 C80 30 90 38 93 52 C88 42 78 40 70 44 C68 41 67 38 67 35 Z"
        fill="#eef1f4" opacity="0.8" stroke="none"/>
  <!-- inner edge shadow -->
  <path d="M70 46 C79 42 88 44 93 53 C86 47 78 47 71 49 Z" fill="#9aa0a8" opacity="0.7" stroke="none"/>
  <!-- eye hole -->
  <ellipse cx="72" cy="41" rx="4" ry="2.6" fill="#2a2e33" stroke="#241a14" stroke-width="1.4" transform="rotate(-18 72 41)"/>
</svg>
