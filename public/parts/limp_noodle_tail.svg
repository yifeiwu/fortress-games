<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- floppy limp noodle tail; base seam left x=0, y34..66 -->
  <!-- solid seam block -->
  <rect x="0" y="34" width="16" height="32" fill="#f0d77a"/>
  <!-- noodle outline (drawn thick & dark underneath) -->
  <path d="M8 50 C26 34 42 36 54 49 C63 59 74 40 84 47 C93 52 90 74 81 81"
        fill="none" stroke="#2b2b2b" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- noodle fill -->
  <path d="M8 50 C26 34 42 36 54 49 C63 59 74 40 84 47 C93 52 90 74 81 81"
        fill="none" stroke="#f0d77a" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- lower shade -->
  <path d="M10 53 C26 38 42 40 54 52 C63 61 74 44 84 50 C92 55 89 73 81 80"
        fill="none" stroke="#e6c95f" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- top highlight -->
  <path d="M14 47 C28 35 42 37 53 47 C63 56 74 39 83 45 C90 49 88 66 82 74"
        fill="none" stroke="#f7e8a8" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- open tube end at the base -->
  <rect x="0" y="34" width="14" height="32" fill="#f0d77a" stroke="#2b2b2b" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="6" cy="50" rx="4.5" ry="13" fill="#e3c258" stroke="#2b2b2b" stroke-width="2"/>
  <ellipse cx="6.5" cy="50" rx="2.4" ry="9" fill="#cdae47" stroke="none"/>
</svg>
