<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#2b2b2b" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- neck seam column -->
    <path d="M74 30 H100 V70 H74 Z" fill="#988a94" stroke="none"/>
    <path d="M74 30 H100 M74 70 H100" fill="none"/>
    <!-- slimy tube body curving down to the sucker -->
    <path d="M86 32 C70 30 40 30 26 38 C14 45 16 60 26 64 C40 70 70 70 86 66 Z" fill="#a99cab"/>
    <!-- belly shading -->
    <path d="M30 60 C50 66 70 66 86 62 L86 66 C70 70 44 70 28 64 Z" fill="#8c7e8c" stroke="none"/>
    <!-- slime highlight stripe -->
    <path d="M34 38 C52 35 70 35 84 36" fill="none" stroke="#cfc6cf" stroke-width="3" opacity="0.8"/>
    <!-- round sucker mouth (faces left) -->
    <ellipse cx="24" cy="50" rx="16" ry="17" fill="#b07686" stroke="#2b2b2b" stroke-width="2"/>
    <ellipse cx="24" cy="50" rx="12" ry="13" fill="#9a5566" stroke="#7a3a4a" stroke-width="1.2"/>
    <ellipse cx="24" cy="50" rx="6" ry="6.5" fill="#7a3a4a" stroke="#5a2434" stroke-width="1.2"/>
    <circle cx="24" cy="50" r="2.5" fill="#2b1218" stroke="none"/>
    <!-- ring of teeth (outer) -->
    <g fill="#ece0c2" stroke="#2b2b2b" stroke-width="0.7">
      <path d="M24 36 l2 4 -4 0 Z"/><path d="M33 39 l3 3 -4 1 Z"/><path d="M37 47 l4 1 -3 3 Z"/>
      <path d="M37 53 l4 -1 -2 4 Z"/><path d="M33 61 l3 -3 1 4 Z"/><path d="M24 64 l2 -4 -4 0 Z"/>
      <path d="M15 61 l-3 -3 4 -1 Z"/><path d="M11 53 l-4 -1 3 -3 Z"/><path d="M11 47 l-4 1 2 -4 Z"/>
      <path d="M15 39 l-3 3 -1 -4 Z"/>
    </g>
    <!-- ring of teeth (inner) -->
    <g fill="#ece0c2" stroke="#2b2b2b" stroke-width="0.6">
      <path d="M24 44 l1.5 3 -3 0 Z"/><path d="M30 49 l3 1 -3 2 Z"/><path d="M27 56 l2 -3 1.5 3 Z"/>
      <path d="M19 55 l1 -3 2 3 Z"/><path d="M17 48 l3 -1 -1 3 Z"/>
    </g>
    <!-- small eye -->
    <circle cx="58" cy="44" r="4.5" fill="#cfc6cf" stroke="#2b2b2b" stroke-width="1.4"/>
    <circle cx="58" cy="44" r="2.2" fill="#1a1a1a" stroke="none"/>
    <circle cx="57" cy="43" r="0.7" fill="#fff" stroke="none"/>
    <!-- skin speckles -->
    <g fill="#8c7e8c" stroke="none">
      <circle cx="48" cy="52" r="1"/><circle cx="56" cy="56" r="1"/><circle cx="66" cy="50" r="1"/>
      <circle cx="70" cy="42" r="1"/><circle cx="50" cy="40" r="1"/><circle cx="62" cy="60" r="1"/>
    </g>
  </g>
</svg>
