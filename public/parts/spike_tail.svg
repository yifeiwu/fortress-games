    <polygon points="46,30 54,32 49,12"/>
    <polygon points="60,30 70,32 66,8"/>
    <polygon points="70,34 80,40 90,16"/>
    <polygon points="74,46 78,54 99,50"/>
    <polygon points="70,60 80,58 88,82"/>
    <polygon points="60,62 68,60 64,86"/>
    <polygon points="54,60 60,56 50,80"/>
